<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Server Souls — Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080810; --surface: #10101c; --surface2: #161624; --surface3: #1c1c2e;
      --border: rgba(255,255,255,0.07); --text: #ede9e4; --muted: #7a7890;
      --accent: #c2607a; --accent-light: #e8859a; --accent-glow: rgba(194,96,122,0.15);
      --bubble-me: #c2607a; --bubble-them: #161624;
      --font-display: 'Cormorant Garamond', serif; --font-body: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: var(--font-body); background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── Chat header ── */
    .chat-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; gap: 14px;
      padding: 0 20px; height: 64px;
      background: rgba(8,8,16,0.9); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); cursor: pointer; text-decoration: none;
      transition: color 0.2s, border-color 0.2s; flex-shrink: 0;
    }
    .back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .chat-avatar { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; background: var(--surface2); flex-shrink: 0; }
    .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-size: 15px; font-weight: 500; }
    .chat-status { font-size: 12px; color: var(--muted); }
    .chat-status.online { color: #4caf7d; }
    .view-profile-btn {
      padding: 7px 14px; border-radius: 8px;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-size: 12px; font-family: var(--font-body);
      cursor: pointer; text-decoration: none;
      transition: color 0.2s, border-color 0.2s; flex-shrink: 0;
    }
    .view-profile-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

    /* ── Messages area ── */
    .messages-area {
      position: fixed; top: 64px; bottom: 76px; left: 0; right: 0;
      overflow-y: auto; padding: 20px 20px 8px;
      display: flex; flex-direction: column; gap: 6px;
      scrollbar-width: thin; scrollbar-color: var(--surface3) transparent;
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

    /* date divider */
    .date-divider {
      text-align: center; font-size: 11px; color: var(--muted);
      letter-spacing: 0.06em; margin: 12px 0 6px;
    }

    /* bubbles */
    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.me { flex-direction: row-reverse; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; background: var(--surface2); flex-shrink: 0; }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .msg-row.me .msg-avatar { display: none; }

    .bubble {
      max-width: 72%; padding: 10px 14px;
      border-radius: 18px; font-size: 14px; line-height: 1.55;
      word-break: break-word;
    }
    .msg-row.them .bubble {
      background: var(--bubble-them); border: 1px solid var(--border);
      color: var(--text); border-bottom-left-radius: 4px;
    }
    .msg-row.me .bubble {
      background: var(--bubble-me); color: white;
      border-bottom-right-radius: 4px;
    }
    .bubble-time {
      font-size: 10px; margin-top: 4px;
      color: rgba(255,255,255,0.35); text-align: right;
    }
    .msg-row.them .bubble-time { color: var(--muted); text-align: left; }

    /* typing indicator */
    .typing-indicator { display: none; }
    .typing-indicator.show { display: flex; }
    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
    .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s ease-in-out infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-5px); opacity: 1; } }

    /* ── Input bar ── */
    .input-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 16px; background: rgba(8,8,16,0.9); backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      display: flex; align-items: flex-end; gap: 10px;
    }
    .msg-input {
      flex: 1; padding: 11px 16px; min-height: 44px; max-height: 120px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 22px; color: var(--text); font-size: 14px;
      font-family: var(--font-body); outline: none; resize: none;
      transition: border-color 0.2s; line-height: 1.5; overflow-y: auto;
    }
    .msg-input::placeholder { color: var(--muted); opacity: 0.6; }
    .msg-input:focus { border-color: rgba(194,96,122,0.4); }
    .send-btn {
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: var(--accent); color: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
    }
    .send-btn:hover { background: var(--accent-light); }
    .send-btn:active { transform: scale(0.92); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* match card at top */
    .match-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; margin-bottom: 20px; text-align: center;
    }
    .match-card-avatar { width: 72px; height: 72px; border-radius: 50%; overflow: hidden; background: var(--surface2); margin: 0 auto 12px; border: 2px solid var(--accent); }
    .match-card-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .match-card-name { font-family: var(--font-display); font-size: 22px; font-style: italic; margin-bottom: 4px; }
    .match-card-sub { font-size: 12px; color: var(--muted); }
    .match-card-tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-top: 10px; }
    .match-tag { padding: 3px 10px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); font-size: 11px; color: var(--muted); }

    .empty-chat { text-align: center; padding: 40px 20px; }
    .empty-chat p { font-family: var(--font-display); font-style: italic; font-size: 18px; color: var(--muted); margin-bottom: 6px; }
    .empty-chat small { font-size: 12px; color: var(--muted); opacity: 0.6; }

    .loading-ring { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 40px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Header -->
<div class="chat-header">
  <a class="back-btn" href="/matches">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <div class="chat-avatar"><img id="headerAvatar" src="" alt=""></div>
  <div class="chat-info">
    <div class="chat-name" id="headerName">Loading...</div>
    <div class="chat-status" id="headerStatus">IISERB</div>
  </div>
  <a class="view-profile-btn" id="viewProfileBtn" href="#">View profile</a>
</div>

<!-- Messages -->
<div class="messages-area" id="messagesArea">
  <div class="loading-ring" id="loadRing"></div>
</div>

<!-- Input -->
<div class="input-bar">
  <textarea class="msg-input" id="msgInput" placeholder="Message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<script src="/app.js"></script>
<script>
  const matchId = new URLSearchParams(window.location.search).get("id");
  let myUserId = null;
  let otherProfile = null;
  let realtimeChannel = null;

  if (!matchId) window.location.href = "/matches";

  async function init() {
    const token = await requireAuth();
    if (!token) return;

    // Get my user id
    const { data: { user } } = await _sb.auth.getUser();
    myUserId = user.id;

    await loadMatchInfo();
    await loadMessages();
    subscribeRealtime();

    document.getElementById("msgInput").addEventListener("input", () => {
      document.getElementById("sendBtn").disabled = !document.getElementById("msgInput").value.trim();
    });
  }

  async function loadMatchInfo() {
    try {
      const matches = await api("/api/matches");
      const match = matches.find(m => m.match_id === matchId);
      if (!match || !match.profile) return;

      otherProfile = match.profile;
      document.getElementById("headerAvatar").src = otherProfile.photo || "";
      document.getElementById("headerName").textContent = `${otherProfile.first_name}, ${otherProfile.age}`;
      document.getElementById("headerStatus").textContent = otherProfile.hostel || "IISERB";
      document.getElementById("viewProfileBtn").href = `/profile?uid=${otherProfile.id}`;
    } catch {}
  }

  async function loadMessages() {
    try {
      const msgs = await api(`/api/messages/${matchId}`);
      document.getElementById("loadRing").style.display = "none";
      renderMessages(msgs);
    } catch (e) {
      document.getElementById("loadRing").style.display = "none";
    }
  }

  function renderMessages(msgs) {
    const area = document.getElementById("messagesArea");

    if (!msgs.length) {
      // Show match card intro
      const tags = [otherProfile?.year, otherProfile?.major, otherProfile?.hostel].filter(Boolean);
      area.innerHTML = `
        <div class="match-card">
          <div class="match-card-avatar">
            <img src="${otherProfile?.photo || ''}" onerror="this.style.display='none'" alt="">
          </div>
          <div class="match-card-name">${otherProfile?.first_name || "?"}, ${otherProfile?.age || "?"}</div>
          <div class="match-card-sub">You matched! Say hello 👋</div>
          ${tags.length ? `<div class="match-card-tags">${tags.map(t=>`<span class="match-tag">${t}</span>`).join("")}</div>` : ""}
        </div>
        <div class="empty-chat">
          <p>start the conversation</p>
          <small>be the first to say something</small>
        </div>
      `;
      return;
    }

    // Group messages by date
    let lastDate = "";
    let html = "";
    msgs.forEach(msg => {
      const d = new Date(msg.created_at);
      const dateStr = d.toLocaleDateString("en-IN", { weekday: "long", month: "short", day: "numeric" });
      if (dateStr !== lastDate) {
        html += `<div class="date-divider">${dateStr}</div>`;
        lastDate = dateStr;
      }
      const isMe = msg.sender_id === myUserId;
      const time = d.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
      html += `
        <div class="msg-row ${isMe ? "me" : "them"}">
          ${!isMe ? `<div class="msg-avatar"><img src="${otherProfile?.photo || ''}" onerror="this.style.display='none'" alt=""></div>` : ""}
          <div>
            <div class="bubble">${escapeHtml(msg.content)}</div>
            <div class="bubble-time">${time}</div>
          </div>
        </div>
      `;
    });

    area.innerHTML = html;
    scrollToBottom();
  }

  function appendMessage(msg) {
    const area = document.getElementById("messagesArea");
    // Remove empty chat placeholder if present
    area.querySelector(".empty-chat")?.remove();
    area.querySelector(".match-card")?.remove();

    const isMe = msg.sender_id === myUserId;
    const time = new Date(msg.created_at).toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });

    const row = document.createElement("div");
    row.className = `msg-row ${isMe ? "me" : "them"}`;
    row.innerHTML = `
      ${!isMe ? `<div class="msg-avatar"><img src="${otherProfile?.photo || ''}" onerror="this.style.display='none'" alt=""></div>` : ""}
      <div>
        <div class="bubble">${escapeHtml(msg.content)}</div>
        <div class="bubble-time">${time}</div>
      </div>
    `;
    area.appendChild(row);
    scrollToBottom();
  }

  async function sendMessage() {
    const input = document.getElementById("msgInput");
    const content = input.value.trim();
    if (!content) return;

    const btn = document.getElementById("sendBtn");
    btn.disabled = true;
    input.value = "";
    input.style.height = "44px";

    try {
      await api(`/api/messages/${matchId}`, { method: "POST", body: { content } });
      // Message will appear via realtime subscription
    } catch (e) {
      input.value = content; // restore on error
      btn.disabled = false;
    }
  }

  function subscribeRealtime() {
    realtimeChannel = _sb
      .channel(`messages:${matchId}`)
      .on("postgres_changes", {
        event: "INSERT",
        schema: "public",
        table: "messages",
        filter: `match_id=eq.${matchId}`
      }, payload => {
        appendMessage(payload.new);
      })
      .subscribe();
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = "44px";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
    document.getElementById("sendBtn").disabled = !el.value.trim();
  }

  function scrollToBottom() {
    const area = document.getElementById("messagesArea");
    setTimeout(() => area.scrollTop = area.scrollHeight, 50);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
  }

  // Cleanup on leave
  window.addEventListener("beforeunload", () => {
    if (realtimeChannel) _sb.removeChannel(realtimeChannel);
  });

  init();
</script>
</body>
</html>
