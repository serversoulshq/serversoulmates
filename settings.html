<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Server Souls — Settings</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080810; --surface: #10101c; --surface2: #161624; --surface3: #1c1c2e;
      --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.13);
      --text: #ede9e4; --muted: #7a7890; --muted2: #4a4860;
      --accent: #c2607a; --accent-light: #e8859a; --accent-glow: rgba(194,96,122,0.15);
      --danger: #e05c5c;
      --font-display: 'Cormorant Garamond', serif; --font-body: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 60px;
      background: rgba(8,8,16,0.85); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { display: flex; align-items: center; gap: 9px; text-decoration: none; }
    .nav-logo { width: 32px; height: 32px; background: var(--accent-glow); border: 1px solid rgba(194,96,122,0.3); border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .nav-logo img { width: 100%; height: 100%; object-fit: cover; }
    .nav-title { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--text); }
    .nav-links { display: flex; align-items: center; gap: 6px; }
    .nav-link { padding: 7px 14px; border-radius: 8px; text-decoration: none; font-size: 13px; color: var(--muted); transition: color 0.2s, background 0.2s; display: flex; align-items: center; gap: 6px; }
    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-link.active { color: var(--accent-light); background: var(--accent-glow); }

    .page { padding-top: 60px; }
    .content { max-width: 560px; margin: 0 auto; padding: 40px 24px 80px; }

    .page-title { font-family: var(--font-display); font-size: 40px; font-style: italic; font-weight: 400; margin-bottom: 32px; }

    /* Setting groups */
    .settings-group { margin-bottom: 32px; }
    .group-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }

    .setting-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-info { flex: 1; }
    .setting-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
    .setting-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

    /* Toggle */
    .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--surface3); border-radius: 24px;
      transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 18px; height: 18px; border-radius: 50%;
      background: white; transition: transform 0.2s;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }

    /* Account info card */
    .account-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px;
      display: flex; align-items: center; gap: 16px; margin-bottom: 32px;
    }
    .account-avatar { width: 52px; height: 52px; border-radius: 50%; overflow: hidden; background: var(--surface2); flex-shrink: 0; }
    .account-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .account-name { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
    .account-email { font-size: 12px; color: var(--muted); }
    .account-badge { margin-left: auto; padding: 4px 10px; background: rgba(76,175,125,0.12); border: 1px solid rgba(76,175,125,0.25); border-radius: 20px; font-size: 11px; color: #4caf7d; flex-shrink: 0; }

    /* Buttons */
    .btn-row { display: flex; gap: 10px; }
    .setting-btn {
      padding: 9px 18px; border-radius: 10px; font-size: 13px;
      font-family: var(--font-body); cursor: pointer;
      transition: all 0.2s;
    }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-outline:hover { border-color: var(--border-hover); color: var(--text); }
    .btn-danger { background: transparent; border: 1px solid rgba(224,92,92,0.3); color: var(--danger); }
    .btn-danger:hover { background: rgba(224,92,92,0.1); border-color: var(--danger); }
    .btn-signout { background: transparent; border: 1px solid var(--border); color: var(--muted); width: 100%; padding: 13px; border-radius: 12px; font-size: 14px; font-family: var(--font-body); cursor: pointer; transition: all 0.2s; margin-top: 8px; }
    .btn-signout:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }

    /* Danger zone */
    .danger-zone { background: rgba(224,92,92,0.05); border: 1px solid rgba(224,92,92,0.15); border-radius: 14px; padding: 20px; margin-top: 32px; }
    .danger-title { font-size: 13px; color: var(--danger); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 14px; }
    .danger-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(224,92,92,0.08); }
    .danger-item:last-child { border-bottom: none; }
    .danger-item-info .danger-item-name { font-size: 14px; margin-bottom: 3px; }
    .danger-item-info .danger-item-desc { font-size: 12px; color: var(--muted); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(8,8,16,0.85); backdrop-filter: blur(6px);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 28px; max-width: 400px; width: calc(100% - 48px); animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes modalIn { from { transform: scale(0.92); opacity: 0; } }
    .modal-title { font-family: var(--font-display); font-size: 26px; font-style: italic; margin-bottom: 10px; }
    .modal-body { font-size: 14px; color: var(--muted); line-height: 1.65; margin-bottom: 24px; }
    .modal-body strong { color: var(--text); }
    .modal-actions { display: flex; gap: 10px; }
    .modal-cancel { flex: 1; padding: 12px; background: transparent; border: 1px solid var(--border); border-radius: 11px; color: var(--muted); font-size: 14px; font-family: var(--font-body); cursor: pointer; }
    .modal-cancel:hover { color: var(--text); border-color: var(--border-hover); }
    .modal-confirm { flex: 1; padding: 12px; background: var(--danger); border: none; border-radius: 11px; color: white; font-size: 14px; font-weight: 500; font-family: var(--font-body); cursor: pointer; transition: opacity 0.2s; }
    .modal-confirm:hover { opacity: 0.85; }

    .loading-ring { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 60px auto; display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/dashboard">
    <div class="nav-logo"><img src="your-logo.png" onerror="this.style.display='none'"></div>
    <span class="nav-title">Server Souls</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="/dashboard">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Discover
    </a>
    <a class="nav-link" href="/matches">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Matches
    </a>
    <a class="nav-link" href="/profile">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
    <a class="nav-link active" href="/settings">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </a>
  </div>
</nav>

<div class="page">
  <div class="content">
    <h1 class="page-title">settings</h1>
    <div id="pageContent"><div class="loading-ring"></div></div>
  </div>
</div>

<!-- Delete confirmation modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-title">delete account</div>
    <div class="modal-body">
      This will permanently delete your profile, photos, matches, and all messages. <strong>This cannot be undone.</strong>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmDelete()">Yes, delete everything</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  async function init() {
    await requireAuth();
    try {
      const profile = await api("/api/profile/me");
      renderSettings(profile);
    } catch {
      document.getElementById("pageContent").innerHTML = `<p style="color:var(--muted)">Could not load settings.</p>`;
    }
  }

  function renderSettings(p) {
    const age = calcAge(p.dob);
    document.getElementById("pageContent").innerHTML = `
      <div class="account-card">
        <div class="account-avatar">
          <img src="${p.photos?.[0]?.url||''}" onerror="this.style.display='none'" alt="">
        </div>
        <div>
          <div class="account-name">${p.first_name||'?'}, ${age||'?'}</div>
          <div class="account-email">${p.email||''}</div>
        </div>
        <div class="account-badge">✓ IISERB verified</div>
      </div>

      <div class="settings-group">
        <div class="group-label">Discovery</div>
        <div class="setting-row">
          <div class="setting-info">
            <div class="setting-name">Show me on Server Souls</div>
            <div class="setting-desc">When off, your profile won't appear in other people's discovery</div>
          </div>
          <label class="toggle">
            <input type="checkbox" checked id="toggleVisible" onchange="savePref('visible', this.checked)">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>
        <div class="setting-row">
          <div class="setting-info">
            <div class="setting-name">Only show people from my hostel</div>
            <div class="setting-desc">Limit discovery to people in ${p.hostel||'your hostel'}</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="toggleSameHostel" onchange="savePref('same_hostel', this.checked)">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>
      </div>

      <div class="settings-group">
        <div class="group-label">Notifications</div>
        <div class="setting-row">
          <div class="setting-info">
            <div class="setting-name">New match notifications</div>
            <div class="setting-desc">Get notified when someone likes you back</div>
          </div>
          <label class="toggle">
            <input type="checkbox" checked id="toggleMatchNotif">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>
        <div class="setting-row">
          <div class="setting-info">
            <div class="setting-name">Message notifications</div>
            <div class="setting-desc">Get notified when you receive a new message</div>
          </div>
          <label class="toggle">
            <input type="checkbox" checked id="toggleMsgNotif">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>
      </div>

      <div class="settings-group">
        <div class="group-label">Account</div>
        <div class="setting-row">
          <div class="setting-info">
            <div class="setting-name">Edit profile</div>
            <div class="setting-desc">Update your photos, bio, and campus info</div>
          </div>
          <div class="btn-row">
            <button class="setting-btn btn-outline" onclick="window.location.href='/profile'">Edit →</button>
          </div>
        </div>
        <div class="setting-row">
          <div class="setting-info">
            <div class="setting-name">Email address</div>
            <div class="setting-desc">${p.email||''} · Verified IISERB</div>
          </div>
        </div>
      </div>

      <button class="btn-signout" onclick="signOut()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>

      <div class="danger-zone">
        <div class="danger-title">Danger zone</div>
        <div class="danger-item">
          <div class="danger-item-info">
            <div class="danger-item-name">Pause account</div>
            <div class="danger-item-desc">Temporarily hide your profile without deleting it</div>
          </div>
          <button class="setting-btn btn-danger" onclick="pauseAccount()">Pause</button>
        </div>
        <div class="danger-item">
          <div class="danger-item-info">
            <div class="danger-item-name">Delete account</div>
            <div class="danger-item-desc">Permanently delete all your data — cannot be undone</div>
          </div>
          <button class="setting-btn btn-danger" onclick="openDeleteModal()">Delete</button>
        </div>
      </div>
    `;
  }

  async function savePref(key, value) {
    // Save preference to profile — extend server.js to handle these if needed
    try { await api("/api/profile/save", { method: "POST", body: { [key]: value } }); } catch {}
  }

  function openDeleteModal() { document.getElementById("deleteModal").classList.add("show"); }
  function closeModal() { document.getElementById("deleteModal").classList.remove("show"); }

  async function confirmDelete() {
    try {
      await api("/api/profile/save", { method: "POST", body: { deleted: true } });
      await signOut();
    } catch (e) {
      alert("Could not delete account: " + e.message);
      closeModal();
    }
  }

  async function pauseAccount() {
    await savePref("visible", false);
    alert("Your profile is now paused. You won't appear in discovery.");
  }

  init();
</script>
</body>
</html>
