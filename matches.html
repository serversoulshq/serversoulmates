<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Server Souls — Matches</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080810; --surface: #10101c; --surface2: #161624; --surface3: #1c1c2e;
      --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.13);
      --text: #ede9e4; --muted: #7a7890; --muted2: #4a4860;
      --accent: #c2607a; --accent-light: #e8859a; --accent-glow: rgba(194,96,122,0.15);
      --font-display: 'Cormorant Garamond', serif; --font-body: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: var(--font-body); background: var(--bg); color: var(--text); }
    .orb { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(90px); }
    .orb-1 { width: 450px; height: 450px; background: radial-gradient(circle, rgba(194,96,122,0.09), transparent 70%); top: -100px; right: -80px; }
    .orb-2 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(80,60,180,0.07), transparent 70%); bottom: -60px; left: -60px; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 60px;
      background: rgba(8,8,16,0.85); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { display: flex; align-items: center; gap: 9px; text-decoration: none; }
    .nav-logo { width: 32px; height: 32px; background: var(--accent-glow); border: 1px solid rgba(194,96,122,0.3); border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .nav-logo img { width: 100%; height: 100%; object-fit: cover; }
    .nav-title { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--text); }
    .nav-links { display: flex; align-items: center; gap: 6px; }
    .nav-link { padding: 7px 14px; border-radius: 8px; text-decoration: none; font-size: 13px; color: var(--muted); transition: color 0.2s, background 0.2s; display: flex; align-items: center; gap: 6px; }
    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-link.active { color: var(--accent-light); background: var(--accent-glow); }

    .page { padding-top: 60px; min-height: 100vh; }
    .content { max-width: 680px; margin: 0 auto; padding: 40px 24px; }

    .page-head { margin-bottom: 32px; }
    .page-title { font-family: var(--font-display); font-size: 40px; font-weight: 400; font-style: italic; margin-bottom: 6px; }
    .page-sub { font-size: 14px; color: var(--muted); }

    /* New matches strip */
    .new-matches-strip { margin-bottom: 36px; }
    .strip-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
    .strip-scroll { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
    .strip-scroll::-webkit-scrollbar { display: none; }
    .new-match-bubble { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 7px; cursor: pointer; }
    .bubble-ring {
      width: 68px; height: 68px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      padding: 2px;
    }
    .bubble-inner { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; background: var(--surface2); }
    .bubble-inner img { width: 100%; height: 100%; object-fit: cover; }
    .bubble-name { font-size: 12px; color: var(--muted); max-width: 68px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Conversation list */
    .conv-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
    .conv-list { display: flex; flex-direction: column; gap: 4px; }
    .conv-item {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 16px; border-radius: 14px;
      background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; text-decoration: none; color: inherit;
      transition: border-color 0.2s, background 0.2s;
    }
    .conv-item:hover { border-color: var(--border-hover); background: var(--surface2); }
    .conv-avatar {
      width: 52px; height: 52px; border-radius: 50%; overflow: hidden;
      background: var(--surface2); flex-shrink: 0; position: relative;
    }
    .conv-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .conv-avatar .online-dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 12px; height: 12px; border-radius: 50%;
      background: #4caf7d; border: 2px solid var(--bg);
    }
    .conv-body { flex: 1; min-width: 0; }
    .conv-name { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
    .conv-preview { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-preview.unread { color: var(--text); font-weight: 500; }
    .conv-right { text-align: right; flex-shrink: 0; }
    .conv-time { font-size: 11px; color: var(--muted2); margin-bottom: 5px; }
    .unread-badge { display: inline-block; background: var(--accent); color: white; font-size: 10px; padding: 1px 7px; border-radius: 10px; }

    .empty-state { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; padding: 60px 0; }
    .empty-icon { font-size: 48px; opacity: 0.2; margin-bottom: 8px; }
    .empty-title { font-family: var(--font-display); font-style: italic; font-size: 22px; color: var(--muted); }
    .empty-sub { font-size: 13px; color: var(--muted); opacity: 0.6; }
    .empty-btn { margin-top: 16px; padding: 11px 24px; background: var(--accent); border: none; border-radius: 10px; color: white; font-size: 14px; font-family: var(--font-body); cursor: pointer; transition: background 0.2s; }
    .empty-btn:hover { background: var(--accent-light); }

    .loading-ring { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 60px auto; display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav>
  <a class="nav-brand" href="/dashboard">
    <div class="nav-logo"><img src="your-logo.png" onerror="this.style.display='none'"></div>
    <span class="nav-title">Server Souls</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="/dashboard">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Discover
    </a>
    <a class="nav-link active" href="/matches">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Matches
    </a>
    <a class="nav-link" href="/profile">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
    <a class="nav-link" href="#" onclick="signOut(); return false;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </a>
  </div>
</nav>

<div class="page">
  <div class="content">
    <div class="page-head">
      <h1 class="page-title">your matches</h1>
      <p class="page-sub" id="matchCount">Loading...</p>
    </div>
    <div id="loadWrap"><div class="loading-ring"></div></div>
    <div id="matchesWrap" style="display:none">
      <div class="new-matches-strip" id="newMatchesStrip" style="display:none">
        <div class="strip-label">New matches</div>
        <div class="strip-scroll" id="stripScroll"></div>
      </div>
      <div id="convsSection" style="display:none">
        <div class="conv-label">Messages</div>
        <div class="conv-list" id="convList"></div>
      </div>
    </div>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">✦</div>
      <div class="empty-title">no matches yet</div>
      <div class="empty-sub">keep swiping — your first match is out there</div>
      <button class="empty-btn" onclick="window.location.href='/dashboard'">Go discover →</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  async function init() {
    await requireAuth();
    await loadMatches();
  }

  async function loadMatches() {
    try {
      const matches = await api("/api/matches");
      document.getElementById("loadWrap").style.display = "none";

      if (!matches.length) {
        document.getElementById("emptyState").style.display = "flex";
        document.getElementById("matchCount").textContent = "No matches yet";
        return;
      }

      document.getElementById("matchCount").textContent = `${matches.length} match${matches.length !== 1 ? "es" : ""}`;
      document.getElementById("matchesWrap").style.display = "block";

      const noMsg = matches.filter(m => !m.last_message);
      const hasMsg = matches.filter(m => m.last_message);

      // New matches strip
      if (noMsg.length) {
        document.getElementById("newMatchesStrip").style.display = "block";
        document.getElementById("stripScroll").innerHTML = noMsg.map(m => `
          <div class="new-match-bubble" onclick="window.location.href='/chat?id=${m.match_id}'">
            <div class="bubble-ring">
              <div class="bubble-inner">
                <img src="${m.profile?.photo || ''}" onerror="this.style.display='none'" alt="">
              </div>
            </div>
            <div class="bubble-name">${m.profile?.first_name || "?"}</div>
          </div>
        `).join("");
      }

      // Conversations
      if (hasMsg.length) {
        document.getElementById("convsSection").style.display = "block";
        document.getElementById("convList").innerHTML = hasMsg.map(m => `
          <a class="conv-item" href="/chat?id=${m.match_id}">
            <div class="conv-avatar">
              <img src="${m.profile?.photo || ''}" onerror="this.style.display='none'" alt="">
            </div>
            <div class="conv-body">
              <div class="conv-name">${m.profile?.first_name || "?"}, ${m.profile?.age || "?"}</div>
              <div class="conv-preview">${m.last_message?.content || ""}</div>
            </div>
            <div class="conv-right">
              <div class="conv-time">${timeAgo(m.last_message?.created_at)}</div>
            </div>
          </a>
        `).join("");
      }
    } catch (e) {
      document.getElementById("loadWrap").innerHTML = `<p style="color:var(--muted);font-size:14px;text-align:center">${e.message}</p>`;
    }
  }

  init();
</script>
</body>
</html>
