<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Souls</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="/unnamed.png" type="image/png">
  <style>
    :root {
      --bg: #080810;
      --surface: #10101c;
      --surface2: #181828;
      --border: rgba(255,255,255,0.07);
      --text: #ede9e4;
      --muted: #7a7890;
      --accent: #c2607a;
      --accent-light: #e8859a;
      --accent-glow: rgba(194,96,122,0.2);
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
    }
    .bg-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(194,96,122,0.12), transparent 70%);
      top: -100px; left: -100px;
      animation: drift1 14s ease-in-out infinite alternate;
    }
    .bg-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(100,80,200,0.08), transparent 70%);
      bottom: -80px; right: -80px;
      animation: drift2 18s ease-in-out infinite alternate;
    }
    @keyframes drift1 { to { transform: translate(60px, 40px); } }
    @keyframes drift2 { to { transform: translate(-40px, -60px); } }

    /* Navbar */
    .navbar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,16,0.85);
      backdrop-filter: blur(12px);
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-icon {
      width: 34px; height: 34px;
      background: var(--accent-glow);
      border: 1px solid rgba(194,96,122,0.3);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-title {
      font-family: var(--font-display);
      font-size: 20px; font-weight: 600;
      color: var(--text);
    }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-email {
      font-size: 13px; color: var(--muted);
      max-width: 220px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .signout-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 16px;
      border: 1px solid rgba(194,96,122,0.3);
      border-radius: 8px;
      background: transparent;
      color: var(--accent-light);
      font-size: 13px; font-family: var(--font-body);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }
    .signout-btn:hover { background: var(--accent-glow); border-color: var(--accent); }
    .signout-btn:active { transform: scale(0.97); }
    .signout-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      position: relative;
      z-index: 1;
    }

    .hint {
      font-size: 11px; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 28px; opacity: 0.6;
    }

    /* Stacked card shadow effect */
    .card-stack {
      position: relative;
      width: 320px;
    }
    .card-stack::before, .card-stack::after {
      content: '';
      position: absolute;
      border-radius: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      left: 50%; transform: translateX(-50%);
    }
    .card-stack::before {
      width: 92%; height: calc(100% - 8px);
      top: -10px; z-index: 0; opacity: 0.55;
    }
    .card-stack::after {
      width: 84%; height: calc(100% - 16px);
      top: -18px; z-index: -1; opacity: 0.25;
    }

    /* Profile card */
    .card {
      position: relative; z-index: 1;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      animation: cardIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.94); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card.exit-right { animation: exitRight 0.32s ease-in forwards; }
    .card.exit-left  { animation: exitLeft  0.32s ease-in forwards; }
    @keyframes exitRight { to { transform: translateX(160%) rotate(18deg); opacity: 0; } }
    @keyframes exitLeft  { to { transform: translateX(-160%) rotate(-18deg); opacity: 0; } }

    .card-photo {
      position: relative;
      height: 360px;
    }
    .card-photo img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .card-photo::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        rgba(8,8,16,1) 0%,
        rgba(8,8,16,0.6) 40%,
        transparent 70%
      );
    }

    .card-body {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 24px 22px 22px;
      z-index: 2;
    }
    .card-name {
      font-family: var(--font-display);
      font-size: 34px; font-weight: 600; font-style: italic;
      color: var(--text); line-height: 1.1; margin-bottom: 6px;
    }
    .card-bio {
      font-size: 13px;
      color: rgba(237,233,228,0.6);
      line-height: 1.5; margin-bottom: 10px;
    }
    .card-tags {
      display: flex; flex-wrap: wrap; gap: 5px;
    }
    .tag {
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      font-size: 11px; color: rgba(237,233,228,0.55);
      letter-spacing: 0.02em;
    }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 20px;
      margin-top: 28px;
      position: relative; z-index: 2;
    }
    .action-btn {
      width: 60px; height: 60px;
      border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 22px;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
    }
    .action-btn:active { transform: scale(0.88) !important; }

    .btn-skip {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .btn-skip:hover {
      transform: scale(1.12) rotate(-10deg);
      color: var(--text);
      border-color: rgba(255,255,255,0.18);
    }
    .btn-like {
      background: var(--accent);
      color: white;
      box-shadow: 0 6px 24px rgba(194,96,122,0.45);
    }
    .btn-like:hover {
      transform: scale(1.12) rotate(10deg);
      background: var(--accent-light);
      box-shadow: 0 8px 32px rgba(194,96,122,0.65);
    }

    /* Empty state */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }
    .empty-icon { font-size: 44px; opacity: 0.25; margin-bottom: 6px; }
    .empty-title {
      font-family: var(--font-display);
      font-style: italic; font-size: 22px;
      color: var(--muted);
    }
    .empty-sub { font-size: 13px; color: var(--muted); opacity: 0.6; }

    /* Auth loading */
    #authGuard {
      position: fixed; inset: 0;
      background: var(--bg); z-index: 100;
      display: flex; align-items: center; justify-content: center;
    }
    .spinner {
      width: 30px; height: 30px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="authGuard"><div class="spinner"></div></div>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-icon">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <path d="M9 15.5S2 11.2 2 6.5A4.5 4.5 0 0 1 9 3.07 4.5 4.5 0 0 1 16 6.5C16 11.2 9 15.5 9 15.5z" fill="#c2607a"/>
      </svg>
    </div>
    <span class="nav-title">Server Souls</span>
  </div>
  <div class="nav-right">
    <span class="nav-email" id="userEmail"></span>
    <button class="signout-btn" id="signoutBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sign out
    </button>
  </div>
</nav>

<main class="main">
  <p class="hint">people at IISER Bhopal</p>

  <div id="cardArea">
    <div class="card-stack" id="cardStack">
      <div class="card" id="profileCard">
        <div class="card-photo">
          <img id="profileImg" src="https://randomuser.me/api/portraits/women/44.jpg" alt="">
          <div class="card-body">
            <div class="card-name" id="profileName">Emma, 21</div>
            <div class="card-bio" id="profileBio">Loves coding & coffee ☕</div>
            <div class="card-tags" id="profileTags"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="action-btn btn-skip" id="skipBtn">✕</button>
      <button class="action-btn btn-like" id="likeBtn">♥</button>
    </div>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="empty-icon">✦</div>
    <div class="empty-title">you've seen everyone</div>
    <div class="empty-sub">check back tomorrow for new people</div>
  </div>
</main>

<script>
  const SUPABASE_URL = "https://yrrytfnfklqlmtsgpcvi.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlycnl0Zm5ma2xxbG10c2dwY3ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDY1ODUsImV4cCI6MjA5MTIyMjU4NX0.wBPIR3x-b6rig0a32kdH6CwpszEKNj6qXZvrKGwKhWU";

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── Auth check ─────────────────────────────────────────────────
  async function init() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) { window.location.href = "login.html"; return; }

    document.getElementById("userEmail").textContent = user.email;
    document.getElementById("authGuard").style.display = "none";

    await sb.from('users').upsert([{ id: user.id, email: user.email }], { onConflict: 'id' });

    renderProfile(current);
  }

  // ── Sign out ───────────────────────────────────────────────────
  document.getElementById("signoutBtn").addEventListener("click", async () => {
    const btn = document.getElementById("signoutBtn");
    btn.innerHTML = "Signing out…";
    btn.disabled = true;
    await sb.auth.signOut();
    window.location.href = "login.html";
  });

  // ── Profiles (replace with DB fetch later) ─────────────────────
  const profiles = [
    {
      name: "Emma, 21",
      bio: "Loves coding & coffee ☕",
      img: "https://randomuser.me/api/portraits/women/44.jpg",
      tags: ["CS 2nd year", "Night owl", "Anime"]
    },
    {
      name: "Priya, 20",
      bio: "Into astrophysics and bad puns 🌌",
      img: "https://randomuser.me/api/portraits/women/68.jpg",
      tags: ["Physics", "Bookworm", "Chai > Coffee"]
    },
    {
      name: "Arjun, 22",
      bio: "Math nerd who cooks surprisingly well 🍜",
      img: "https://randomuser.me/api/portraits/men/32.jpg",
      tags: ["Math", "Foodie", "Guitar"]
    },
  ];

  let current = 0;
  let animating = false;

  function renderProfile(i) {
    const p = profiles[i];
    document.getElementById("profileImg").src = p.img;
    document.getElementById("profileName").textContent = p.name;
    document.getElementById("profileBio").textContent = p.bio;
    document.getElementById("profileTags").innerHTML =
      p.tags.map(t => `<span class="tag">${t}</span>`).join('');
  }

  function swipe(direction) {
    if (animating) return;
    animating = true;

    const card = document.getElementById("profileCard");
    card.classList.add(direction === 'like' ? 'exit-right' : 'exit-left');

    setTimeout(() => {
      current++;
      if (current >= profiles.length) {
        document.getElementById("cardArea").style.display = "none";
        document.getElementById("emptyState").style.display = "flex";
        animating = false;
        return;
      }
      renderProfile(current);
      card.classList.remove('exit-right', 'exit-left');
      // re-trigger entry animation
      void card.offsetWidth;
      card.style.animation = 'none';
      void card.offsetWidth;
      card.style.animation = '';
      animating = false;
    }, 300);
  }

  document.getElementById("likeBtn").addEventListener("click", () => swipe('like'));
  document.getElementById("skipBtn").addEventListener("click", () => swipe('skip'));

  // Keyboard shortcuts
  document.addEventListener("keydown", e => {
    if (e.key === "ArrowRight") swipe('like');
    if (e.key === "ArrowLeft")  swipe('skip');
  });

  init();
</script>
</body>
</html>
